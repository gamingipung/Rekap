<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalkulator Rekap</title>
  
  <style>
    body {
      background: #0f172a;
      font-family: Arial;
      color: white;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.08);
      border: 5px solid rgba(255, 255, 255, 0.08);
      border-radius: 25px;
      margin: 30px;
      padding: 20px;
      
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container-2 {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      font-size: 20px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-radius: 16px;
    }
    .container-2 a {
      color: black;
      text-decoration: none;
      background: #e5e7eb;
      border-radius: 16px;
      padding: 10px 20px;
      display: inline-block;
      font-weight: bold;
      border: none;
    }
    .box {
      width: 90%;
      max-width: 500px;
    }
    
    textarea {
      width: 95%;
      height: 250px;
      font-size: 14px;
      border-radius: 15px;
      padding: 10px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      background: lightblue;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }
    
    pre {
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.08);
      padding: 15px;
      border-radius: 15px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  
  <div class="container">
    <div class="box">
      
      <textarea id="data" placeholder="Paste data di sini..."></textarea>
      
      <button type="button" onclick="hitung()">Hitung</button>
      
      <pre id="hasil"></pre>
      
    </div>
  </div>
  <div class="container-2">
    <p><a href="index.html">REKAP DATA</a></p>
    <p><a href="rekap.html">REKAP WIN</a></p>
  </div>
  
  <script>
    function rekapData(text) {
      let regex = /([A-Za-z]+)\s*:(.*?)(?=\n[A-Za-z]+\s*:|$)/gis;
        let hasil = [];
        let match;
        
        while ((match = regex.exec(text)) !== null )
        {
          let nama = match[1];
          let isi = match[2];
          
          let angka = isi.match(/\d+/g);
          let total = 0;
          if (angka) {
            total = angka.reduce((a, b) => a + Number(b), 0);
            hasil.push({ nama, total })
          }
        }
        return hasil;
      }
      
      function hitung() {
        let text = document.getElementById("data").value;
        let data = rekapData(text);
        
        if (data.length < 2) {
          document.getElementById("hasil").textContent = "Minimal 2 Nama";
          return
        }
        
        let d1 = data[0]
        let d2 = data[1]
        
        let selisih = Math.abs(d1.total - d2.total);
        let hasil = "";
        
        hasil += "🔵" + d1.nama + ": " + d2.total + "\n\n";
        hasil += "🔴" + d2.nama + ": " + d1.total + "\n\n"
        
        if (d1.total > d2.total) {
          hasil += "" + d1.nama + " Masih Kekurangan " + selisih + " untuk Menyamai " + d2.nama
        } else if (d2.total > d1.total) {
          hasil += "" + d2.nama + " Masih Kekurangan " + selisih + " untuk Menyamai " + d1.nama
        } else {
          hasil += "🔰" + d1.nama + " DAN " + d2.nama + " Telah Seimbang"
        }
        document.getElementById("hasil").textContent = hasil;
      }
  </script>
</body>

</html>
