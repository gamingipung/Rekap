<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rekap Auto + Fee</title>
  
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    
    .box {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 5px solid rgba(255, 255, 255, 0.05);
      border-radius: 25px;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .container-2 {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      font-size: 20px;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-radius: 16px;
    }
    
    .container-2 a {
      color: black;
      text-decoration: none;
      background: #e5e7eb;
      border-radius: 16px;
      padding: 10px 20px;
      display: inline-block;
      font-weight: bold;
      border: none;
    }
    
    input {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }
    
    textarea {
      width: 90%;
      height: 200px;
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    
    button {
      margin-top: 10px;
      padding: 12px;
      width: 95%;
      background: lightblue;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .hasil {
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      width: 90%;
      border-radius: 10px;
    }
    
    .item {
      margin: 6px 0;
    }
    
    .total {
      margin-top: 15px;
      font-weight: bold;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 10px;
    }
  </style>
</head>

<body>
  
  <div class="box">
    
    <input type="text" id="target" placeholder="Masukkan nama Pemain Yang Win">
    <textarea id="data" placeholder="Paste data di sini..."></textarea>
    
    <button onclick="proses()">PROSES</button>
    <button onclick="salin()">SALIN SEMUA</button>
    
    <div id="hasil" class="hasil"></div>
  </div>
  <div class="container-2">
    <p><a href="index.html">REKAP DATA</a></p>
    <p><a href="rekap.html">REKAP WIN</a></p>
  </div>
  
  <script>
    function getFee(n) {
      return Math.floor(n / 20) + 1;
    }
    
    function proses() {
      let target = document.getElementById("target").value.toUpperCase();
      let text = document.getElementById("data").value;
      
      let lines = text.split("\n");
      let mulai = false;
      let hasil = "";
      let totalAkhir = 0;
      
      lines.forEach(line => {
        let asli = line.trim();
        let upper = asli.toUpperCase();
        let cleanTarget = target.replace(/\s+/g, "");
        
        if (upper.replace(/\s+/g, "").startsWith(cleanTarget + ":")) {
          mulai = true;
          return;
        }
        
        if (mulai && upper.endsWith(":")) {
          mulai = false;
        }
        
        if (!mulai || asli === "") return;
        
        let match = asli.match(/\d+/g);
        if (!match) return;
        
        let total = match.reduce((a, b) => a + parseInt(b), 0);
        
        let x2 = total * 2;
        let fee = getFee(x2);
        let final = x2 - fee;
        totalAkhir += final;
        
        let nama = asli.replace(/[\d+]/g, "").trim();
        
        hasil += `
<div class="item">
${nama} = ${total} / ${final}
</div>`;
      });
      
      hasil += `<div class="total">TOTAL SEMUA: ${totalAkhir}</div>`;
      
      document.getElementById("hasil").innerHTML = hasil;
    }
    
    function salin() {
      let btn = event.target;
      let text = document.getElementById("hasil").innerText;
      
      navigator.clipboard.writeText(text).then(() => {
        btn.innerText = "✅ TERSALIN";
        
        setTimeout(() => {
          btn.innerText = "SALIN SEMUA";
        }, 2000);
      });
    }
  </script>
  
</body>
</html>
